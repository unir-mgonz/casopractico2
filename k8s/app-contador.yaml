# =============================================================================
# app-contador.yaml - Demo Sesión 3: Deployment + Service (SIN persistencia)
# =============================================================================
# Despliega la app-contador SIN volumen persistente. Sirve para demostrar la
# PÉRDIDA DE DATOS: el contador se reinicia a 0 al recrear el pod.
# En la Sesión 4 se añade un PVC para que el contador sobreviva.
# Cambia <ACR> por tu login server.
#
# Flujo visual en clase:
#   kubectl apply -f app-contador.yaml
#   kubectl get svc contador -w        # esperar EXTERNAL-IP
#   -> abrir en el navegador y recargar: el contador sube (1, 2, 3...)
#   kubectl delete pod -l app=contador            # borra el pod -> nace otro
#   -> recargar: el contador VUELVE A 1  => los datos se han perdido
#   (Sesión 4: con un PVC montado en /data, el contador seguiría donde estaba)
#   Nota: usa "delete pod" (no "rollout restart": el solape de pods puede
#   confundir). Al borrar el pod, el nuevo arranca con el sistema de ficheros
#   limpio y el contador a 0.
# -----------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: contador
  labels: { app: contador }
spec:
  replicas: 1
  selector:
    matchLabels: { app: contador }
  template:
    metadata:
      labels: { app: contador }
    spec:
      containers:
        - name: contador
          image: unirmgonzacr.azurecr.io/app-contador:latest
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: contador
spec:
  type: LoadBalancer
  selector:
    app: contador
  ports:
    - port: 80
      targetPort: 8080