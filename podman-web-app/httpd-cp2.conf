# =============================================================================
# httpd-cp2.conf - VirtualHosts de Apache
# =============================================================================
# ${SERVER_NAME} es la variable de entorno que exporta entrypoint.sh con el
# FQDN. Apache expande ${VAR} leyendo el entorno del proceso.
# =============================================================================

Listen 443

# Se redirecciona a https si entra trafico a traves del puerto 80 que no sea de la verificación de certbot.
<VirtualHost *:80>
    ServerName ${SERVER_NAME}

    RewriteEngine On

    # El reto ACME (/.well-known/acme-challenge/) no debe redirigirse.
    RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
    RewriteRule ^/?(.*)$ https://%{HTTP_HOST}/$1 [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName ${SERVER_NAME}
    DocumentRoot "/usr/local/apache2/htdocs"

    SSLEngine on
    SSLCertificateFile    "/etc/letsencrypt/live/${SERVER_NAME}/fullchain.pem"
    SSLCertificateKeyFile "/etc/letsencrypt/live/${SERVER_NAME}/privkey.pem"

    <Directory "/usr/local/apache2/htdocs">
        AuthType Basic
        AuthName "Area restringida - Caso Practico 2 UNIR"
        AuthUserFile "/usr/local/apache2/.htpasswd"
        Require valid-user
    </Directory>
</VirtualHost>
